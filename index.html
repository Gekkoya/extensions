<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WASM Extensions Repository</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
h1 { color: #333; margin-bottom: 10px; }
.stats { color: #666; margin-bottom: 30px; font-size: 14px; }
.search { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; }
.search:focus { outline: none; border-color: #4CAF50; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
th { background: #4CAF50; color: white; font-weight: 600; position: sticky; top: 0; }
tr:hover { background: #f9f9f9; }
.icon { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
.badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
.badge-nsfw { background: #ff4444; color: white; }
.badge-lang { background: #2196F3; color: white; }
a { color: #4CAF50; text-decoration: none; font-weight: 500; }
a:hover { text-decoration: underline; }
.version { color: #666; font-family: monospace; }
</style>
</head>
<body>
<div class="container">
<h1>WASM Extensions Repository</h1>
<div class="stats">Total extensions: <strong>1</strong></div>
<input type="text" class="search" id="search" placeholder="Search extensions..." onkeyup="filterTable()">
<table id="extensionsTable">
<thead><tr><th>Icon</th><th>Name</th><th>Language</th><th>Version</th><th>Size</th><th>Download</th></tr></thead>
<tbody>
<tr><td><img src="icon/es.mangasin.png" class="icon" alt="Mangas.in" onerror="this.style.display='none'"></td><td><strong>Mangas.in</strong> <span class="badge badge-nsfw">NSFW</span> </td><td><span class="badge badge-lang">es</span></td><td class="version">1.0.0</td><td>2400.9 KB</td><td><a href="wasm/es/mangasin.wasm" download>⬇️ Download</a></td></tr>
</tbody>
</table>
<script>
function filterTable() {
  const input = document.getElementById("search");
  const filter = input.value.toUpperCase();
  const table = document.getElementById("extensionsTable");
  const tr = table.getElementsByTagName("tr");
  for (let i = 1; i < tr.length; i++) {
    const td = tr[i].getElementsByTagName("td")[1];
    if (td) {
      const txtValue = td.textContent || td.innerText;
      tr[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
    }
  }
}
</script>
</div>
</body>
</html>
